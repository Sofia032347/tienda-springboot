<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestión de Proveedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/usuarios">Sistema Tienda</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/usuarios">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/proveedores">Proveedores</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/clientes">Clientes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/productos">Productos</a>
                </li>
            </ul>

            <a href="/login" class="btn btn-outline-light btn-sm">Cerrar Sesión</a>
        </div>
    </div>
</nav>
<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Gestión de Proveedores</h5>

            <form method="get" action="/proveedores" class="d-flex">
                <input type="text"
                       name="buscar"
                       th:value="${buscar}"
                       class="form-control form-control-sm me-2"
                       placeholder="Buscar por nombre, NIT o ciudad">

                <button class="btn btn-light btn-sm">Buscar</button>
            </form>
        </div>

        <div class="card-body">

            <div class="mb-3">
                <a href="/proveedores/nuevo" class="btn btn-success">
                    + Nuevo Proveedor
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover">

                    <thead class="table-dark text-center">
                    <tr>
                        <th>NIT</th>
                        <th>Nombre</th>
                        <th>Dirección</th>
                        <th>Teléfono</th>
                        <th>Ciudad</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="p : ${listaProveedores}">
                        <td th:text="${p.nit}"></td>
                        <td th:text="${p.nombreProveedor}"></td>
                        <td th:text="${p.direccion}"></td>
                        <td th:text="${p.telefono}"></td>
                        <td>
                                <span class="badge bg-info text-dark"
                                      th:text="${p.ciudad}">
                                </span>
                        </td>

                        <td class="text-center">
                            <a th:href="@{/proveedores/editar/{id}(id=${p.id})}"
                               class="btn btn-warning btn-sm">Editar</a>

                            <a th:href="@{/proveedores/eliminar/{id}(id=${p.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar proveedor?')">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
