<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/ventas">Sistema Tienda</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Detalle de la Venta</h5>
        <a href="/ventas" class="btn btn-outline-secondary btn-sm">← Volver</a>
    </div>

    <div class="card shadow">

        <div class="card-body">

            <p><strong>ID Venta:</strong> <span th:text="${venta.codigoVenta}"></span></p>

            <table class="table table-striped table-hover mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Cantidad</th>
                    <th>Código Producto</th>
                    <th>Código Venta</th>
                    <th>Valor Unitario</th>
                    <th>Total Producto</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${detalles}">
                    <td th:text="${d.id}"></td>
                    <td th:text="${d.cantidad}"></td>
                    <td th:text="${d.codigoProducto}"></td>
                    <td th:text="${d.codigoVenta}"></td>
                    <td class="text-end"
                        th:text="'$ ' + ${#numbers.formatDecimal(d.valorUnitario, 0, 'POINT', 0, 'COMMA')}">
                    </td>
                    <td class="text-end"
                        th:text="'$ ' + ${#numbers.formatDecimal(d.totalProducto, 0, 'POINT', 0, 'COMMA')}">
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
