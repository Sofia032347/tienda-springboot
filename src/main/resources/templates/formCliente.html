<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/clientes">Sistema Tienda</a>
    </div>
</nav>

<div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
</div>

<div class="container mt-4">

    <a href="/clientes" class="btn btn-secondary mb-3">
        ← Volver
    </a>

    <div class="card shadow col-md-6 mx-auto">
        <div class="card-body p-4">

            <h4 class="text-center mb-4"
                th:text="${cliente.id == null} ? 'Nuevo Cliente' : 'Editar Cliente'">
            </h4>

            <form th:action="@{/clientes/guardar}"
                  th:object="${cliente}"
                  method="post">

                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label">Cédula</label>
                    <input type="text" th:field="*{cedula}" class="form-control" required
                           placeholder="Ej: 1234567890">
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" th:field="*{nombreCompleto}" class="form-control" required
                           placeholder="Ej: Juan Pérez García">
                </div>

                <div class="mb-3">
                    <label class="form-label">Dirección</label>
                    <input type="text" th:field="*{direccion}" class="form-control" required
                           placeholder="Ej: Calle 10 # 5-20">
                </div>

                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" th:field="*{telefono}" class="form-control" required
                           placeholder="Ej: 3001234567">
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" th:field="*{correoElectronico}" class="form-control" required
                           placeholder="Ej: juan@correo.com">
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success">
                        Guardar
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
