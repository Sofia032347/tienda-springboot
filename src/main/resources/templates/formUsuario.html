<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/usuarios">Sistema Tienda</a>
    </div>
</nav>

<div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
</div>

<div class="container mt-4">

    <a href="/usuarios" class="btn btn-secondary mb-3">
        ← Volver
    </a>

    <div class="card shadow p-4 col-md-6 mx-auto">
        <h4 class="mb-4 text-center">Formulario de Usuario</h4>

        <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post" novalidate>

            <input type="hidden" th:field="*{id}"/>

            <div class="mb-3">
                <label class="form-label">Cédula</label>
                <input type="text" th:field="*{cedula}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Nombre Completo</label>
                <input type="text" th:field="*{nombreCompleto}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" th:field="*{correo}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Nombre de Usuario</label>
                <input type="text" th:field="*{username}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>

                <div class="input-group">
                    <input type="password"
                           th:field="*{password}"
                           id="passwordField"
                           class="form-control">

                    <button type="button"
                            class="btn btn-outline-secondary"
                            onclick="togglePassword()">
                        👁
                    </button>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Guardar
                </button>
            </div>

        </form>
    </div>

</div>
<script>
    function togglePassword() {
        const field = document.getElementById("passwordField");

        if (field.type === "password") {
            field.type = "text";
        } else {
            field.type = "password";
        }
    }
</script>
</body>
</html>
