<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestión de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/usuarios">Sistema Tienda</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/usuarios">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/proveedores">Proveedores</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/clientes">Clientes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/productos">Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/ventas">Ventas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/consutayreportes">Consulta Y Reportes</a>
                </li>
            </ul>

            <a href="/login" class="btn btn-outline-light btn-sm">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- MENSAJES -->
    <div th:if="${mensaje}" class="alert alert-success">
        <span th:text="${mensaje}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <div class="card shadow">

        <!-- HEADER -->
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Gestión de Ventas</h5>

            <form method="get" action="/ventas" class="d-flex">
                <input type="text"
                       name="buscar"
                       th:value="${buscar}"
                       class="form-control form-control-sm me-2"
                       placeholder="Buscar por cédula">

                <button class="btn btn-light btn-sm">Buscar</button>
            </form>
        </div>

        <div class="card-body">

            <!-- BOTÓN NUEVA VENTA -->
            <div class="mb-3">
                <a href="/ventas/nuevo" class="btn btn-success">
                    + Nueva Venta
                </a>

                <span class="text-muted">
                    Total registros:
                    <strong th:text="${#lists.size(ventas)}"></strong>
                </span>
            </div>

            <!-- TABLA -->
            <div class="table-responsive">
                <table class="table table-striped table-hover">

                    <thead class="table-dark text-center">
                    <tr>
                        <th>Código</th>
                        <th>Cédula Cliente</th>
                        <th>Total Venta</th>
                        <th>IVA</th>
                        <th>Total con IVA</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="v : ${listaVentas}">
                        <td th:text="${v.codigoVenta}"></td>
                        <td th:text="${v.cedulaCliente}"></td>
                        <td th:text="${v.totalVenta}"></td>
                        <td th:text="${v.totalIva}"></td>
                        <td th:text="${v.totalConIva}"></td>

                        <td class="text-center">
                            <a th:href="@{/ventas/detalle/{id}(id=${v.codigoVenta})}"
                               class="btn btn-info btn-sm">
                                Ver
                            </a>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
