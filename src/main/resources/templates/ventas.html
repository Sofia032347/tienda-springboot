<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between">
            <h5>Gestión de Ventas</h5>
            <a href="/ventas/nuevo" class="btn btn-light btn-sm">+ Nueva Venta</a>
        </div>

        <div class="card-body">

            <p>
                Total registros:
                <strong th:text="${listaVentas != null ? #lists.size(listaVentas) : 0}"></strong>
            </p>

            <table class="table table-striped table-hover">

                <thead class="table-dark text-center">
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Usuario</th>
                    <th>Total Venta</th>
                    <th>IVA</th>
                    <th>Total con IVA</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="v : ${listaVentas}">
                    <td th:text="${v.codigoVenta}"></td>
                    <td th:text="${v.cedulaCliente}"></td>
                    <td th:text="${v.cedulaUsuario}"></td>
                    <td th:text="${v.totalVenta}"></td>
                    <td th:text="${v.totalIva}"></td>
                    <td th:text="${v.totalConIva}"></td>

                    <td class="text-center">
                        <a th:href="@{/ventas/eliminar/{id}(id=${v.codigoVenta})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Eliminar venta?')">
                            Eliminar
                        </a>
                    </td>
                </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
