<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reporte - Listado de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Sistema Tienda</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/reportes">Volver a Reportes</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h5 class="mb-3">📋 Listado de Clientes</h5>

    <a href="/ventas" class="btn btn-secondary mb-3">
        ← Volver
    </a>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Cédula</th>
                    <th>Nombre Completo</th>
                    <th>Dirección</th>
                    <th>Teléfono</th>
                    <th>Correo Electrónico</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${listaClientes}">
                    <td th:text="${c.cedula}"></td>
                    <td th:text="${c.nombreCompleto}"></td>
                    <td th:text="${c.direccion}"></td>
                    <td th:text="${c.telefono}"></td>
                    <td th:text="${c.correoElectronico}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
