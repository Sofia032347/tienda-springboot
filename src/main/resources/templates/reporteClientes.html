<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reporte - Listado de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Sistema Tienda</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">📋 Listado de Clientes</h5>
        <a href="/reportes" class="btn btn-outline-secondary btn-sm">← Volver a Reportes</a>
    </div>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Cédula</th>
                    <th>Nombre Completo</th>
                    <th>Dirección</th>
                    <th>Teléfono</th>
                    <th>Correo Electrónico</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${listaClientes}">
                    <td th:text="${c.cedula}"></td>
                    <td th:text="${c.nombreCompleto}"></td>
                    <td th:text="${c.direccion}"></td>
                    <td th:text="${c.telefono}"></td>
                    <td th:text="${c.correoElectronico}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
