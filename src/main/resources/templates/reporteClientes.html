<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reporte - Listado de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/usuarios">Sistema Tienda</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/usuarios">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link" href="/proveedores">Proveedores</a></li>
                <li class="nav-item"><a class="nav-link" href="/clientes">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="/productos">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="/ventas">Ventas</a></li>
                <li class="nav-item"><a class="nav-link active" href="/reportes">Consulta Y Reportes</a></li>
            </ul>
            <a href="/login" class="btn btn-outline-light btn-sm">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">🧑‍🤝‍🧑 Listado de Clientes</h5>
        <a href="/consutayreportes" class="btn btn-outline-secondary btn-sm">← Volver a Reportes</a>
    </div>

    <!-- Mensaje si no hay datos -->
    <div th:if="${mensaje}" class="alert alert-warning">
        <span th:text="${mensaje}"></span>
    </div>

    <div th:if="${listaClientes != null and !#lists.isEmpty(listaClientes)}" class="card shadow">
        <div class="card-header bg-success text-white">
            <span>Total registros: <strong th:text="${#lists.size(listaClientes)}"></strong></span>
        </div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark text-center">
                    <tr>
                        <th>#</th>
                        <th>Cédula</th>
                        <th>Nombre Completo</th>
                        <th>Correo Electrónico</th>
                        <th>Dirección</th>
                        <th>Teléfono</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c, iter : ${listaClientes}">
                        <td th:text="${iter.count}" class="text-center"></td>
                        <td th:text="${c.cedula}"></td>
                        <td th:text="${c.nombreCompleto}"></td>
                        <td th:text="${c.correoElectronico}"></td>
                        <td th:text="${c.direccion}"></td>
                        <td th:text="${c.telefono}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
