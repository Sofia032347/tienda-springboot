<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Proveedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/proveedor">Sistema Tienda</a>
    </div>
</nav>

<div class="container mt-4">

    <a href="/proveedores" class="btn btn-secondary mb-3">
        ← Volver
    </a>

    <div class="card shadow col-md-6 mx-auto">
        <div class="card-body p-4">

            <h4 class="text-center mb-4"
                th:text="${proveedor.id == null} ? 'Nuevo Proveedor' : 'Editar Proveedor'">
            </h4>

            <form th:action="@{/proveedores/guardar}"
                  th:object="${proveedor}"
                  method="post">

                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label">NIT</label>
                    <input type="text" th:field="*{nit}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre Proveedor</label>
                    <input type="text" th:field="*{nombreProveedor}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Dirección</label>
                    <input type="text" th:field="*{direccion}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" th:field="*{telefono}" class="form-control" required>
                </div>

                <!-- SELECT CIUDADES -->
                <div class="mb-3">
                    <label class="form-label">Ciudad</label>
                    <select th:field="*{ciudad}" class="form-select" required>

                        <option value="">Seleccione una ciudad</option>

                        <option value="Bogotá">Bogotá</option>
                        <option value="Medellín">Medellín</option>
                        <option value="Cali">Cali</option>
                        <option value="Barranquilla">Barranquilla</option>
                        <option value="Cartagena">Cartagena</option>
                        <option value="Bucaramanga">Bucaramanga</option>
                        <option value="Pereira">Pereira</option>
                        <option value="Manizales">Manizales</option>
                        <option value="Santa Marta">Santa Marta</option>
                        <option value="Cúcuta">Cúcuta</option>
                        <option value="Villavicencio">Villavicencio</option>
                        <option value="Neiva">Neiva</option>
                        <option value="Pasto">Pasto</option>
                        <option value="Armenia">Armenia</option>
                        <option value="Montería">Montería</option>
                        <option value="Ibagué">Ibagué</option>

                    </select>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Guardar
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
