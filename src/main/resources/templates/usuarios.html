<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">
        <h2>Gestión de Usuarios</h2>
        <a href="/usuarios/nuevo" class="btn btn-success">Nuevo Usuario</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Cédula</th>
            <th>Nombre Completo</th>
            <th>Correo</th>
            <th>Usuario</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${usuarios}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.cedula}"></td>
            <td th:text="${u.nombreCompleto}"></td>
            <td th:text="${u.correo}"></td>
            <td th:text="${u.username}"></td>
            <td>
                <a th:href="@{/usuarios/editar/{id}(id=${u.id})}"
                   class="btn btn-warning btn-sm">Editar</a>

                <a th:href="@{/usuarios/eliminar/{id}(id=${u.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Seguro que deseas eliminar este usuario?')">
                    Eliminar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
