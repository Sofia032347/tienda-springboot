<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/usuarios">Sistema Tienda</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/usuarios">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/proveedores">Proveedores</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/clientes">Clientes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/productos">Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/ventas">Ventas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/reportes">Consulta Y Reportes</a>
                </li>
            </ul>

            <a href="/login" class="btn btn-outline-light btn-sm">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div th:if="${mensaje}" class="alert alert-success">
        <span th:text="${mensaje}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Gestión de Usuarios</h5>

            <form method="get" action="/usuarios" class="d-flex">
                <input type="text"
                       name="buscar"
                       th:value="${buscar}"
                       class="form-control form-control-sm me-2"
                       placeholder="Buscar por nombre, usuario o cédula">

                <button class="btn btn-light btn-sm">Buscar</button>
            </form>
        </div>

        <div class="card-body">

            <div class="d-flex justify-content-between mb-3">
                <a href="/usuarios/nuevo" class="btn btn-success">
                    + Nuevo Usuario
                </a>

                <span class="text-muted">
                    Total registros:
                    <strong th:text="${#lists.size(listaUsuarios)}"></strong>
                </span>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">

                    <thead class="table-dark text-center">
                    <tr>
                        <th>Cédula</th>
                        <th>Nombre Completo</th>
                        <th>Correo</th>
                        <th>Usuario</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:if="${#lists.isEmpty(listaUsuarios)}">
                        <td colspan="5" class="text-center text-muted">
                            No hay usuarios registrados.
                        </td>
                    </tr>

                    <tr th:each="u : ${listaUsuarios}">
                        <td th:text="${u.cedula}"></td>
                        <td th:text="${u.nombreCompleto}"></td>
                        <td th:text="${u.correo}"></td>
                        <td>
                            <span class="badge bg-secondary"
                                  th:text="${u.username}">
                            </span>
                        </td>

                        <td class="text-center">
                            <a th:href="@{/usuarios/editar/{id}(id=${u.id})}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <a th:href="@{/usuarios/eliminar/{id}(id=${u.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Seguro que deseas eliminar este usuario?')">
                                Eliminar
                            </a>
                        </td>
                    </tr>

                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
