<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrar Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h3 class="text-center">Registro de Venta</h3>

    <!-- MENSAJES -->
    <div th:if="${mensaje}" class="alert alert-info">
        <span th:text="${mensaje}"></span>
    </div>

    <form action="/ventas/guardar" method="post">

        <!-- 🧍 CLIENTE -->
        <div class="card p-3 mb-3">
            <h5>Cliente</h5>

            <label>Cédula</label>
            <input type="text" name="cedulaCliente" class="form-control" required>
        </div>

        <!-- 📦 PRODUCTOS -->
        <div class="card p-3 mb-3">
            <h5>Productos (Máximo 3)</h5>

            <!-- Producto 1 -->
            <div class="row mb-2">
                <div class="col">
                    <input type="text" name="codigoProducto1" placeholder="Código" class="form-control">
                </div>
                <div class="col">
                    <input type="number" name="cantidad1" placeholder="Cantidad" class="form-control">
                </div>
            </div>

            <!-- Producto 2 -->
            <div class="row mb-2">
                <div class="col">
                    <input type="text" name="codigoProducto2" placeholder="Código" class="form-control">
                </div>
                <div class="col">
                    <input type="number" name="cantidad2" placeholder="Cantidad" class="form-control">
                </div>
            </div>

            <!-- Producto 3 -->
            <div class="row mb-2">
                <div class="col">
                    <input type="text" name="codigoProducto3" placeholder="Código" class="form-control">
                </div>
                <div class="col">
                    <input type="number" name="cantidad3" placeholder="Cantidad" class="form-control">
                </div>
            </div>
        </div>

        <!-- 🧮 BOTÓN -->
        <div class="d-grid">
            <button type="submit" class="btn btn-primary">
                Registrar Venta
            </button>
        </div>

    </form>

</div>

</body>
</html>
