<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h5>Nueva Venta</h5>
        </div>

        <div class="card-body">

            <form th:action="@{/ventas/guardar}" th:object="${venta}" method="post">

                <div class="mb-3">
                    <label>Cédula Cliente</label>
                    <input type="text" th:field="*{cedulaCliente}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Cédula Usuario</label>
                    <input type="text" th:field="*{cedulaUsuario}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Total Venta</label>
                    <input type="number" step="0.01" th:field="*{totalVenta}" class="form-control" required>
                </div>

                <button class="btn btn-success">Guardar</button>
                <a href="/ventas" class="btn btn-secondary">Cancelar</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
