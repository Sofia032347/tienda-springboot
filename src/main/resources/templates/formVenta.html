<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/ventas">Sistema Tienda</a>
    </div>
</nav>

<div class="container mt-4">

    <a href="/ventas" class="btn btn-secondary mb-3">
        ← Volver
    </a>

    <div class="card shadow">

        <div th:if="${param.errorCantidad}" class="alert alert-danger">
            <span th:text="${param.errorCantidad}"></span>
        </div>

        <div class="card-body">

            <h5 class="mb-4 text-center">Registrar Venta</h5>

            <!-- CONSULTA CLIENTE -->
            <form method="get" th:action="@{/ventas/nuevo}">

                <div class="row mb-3">

                    <div class="col-md-3">
                        <label>Cédula</label>
                        <input type="text" name="cedula"
                               th:value="${cedula != null ? cedula : param.cedula}"
                               class="form-control">
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-secondary">
                            Consultar
                        </button>
                    </div>

                    <div class="col-md-5">
                        <label>Cliente</label>
                        <input type="text" class="form-control"
                               th:value="${cliente != null ? cliente.nombreCompleto : ''}"
                               readonly>
                    </div>

                </div>

                <div th:if="${mensajeCliente}" class="alert alert-success">
                    <span th:text="${mensajeCliente}"></span>
                </div>

                <div th:if="${errorCliente}" class="alert alert-danger">
                    <span th:text="${errorCliente}"></span>
                </div>

                <!-- PRODUCTOS -->

                <table class="table table-bordered text-center">
                    <thead class="table-dark">
                    <tr>
                        <th>Código</th>
                        <th></th>
                        <th>Nombre Producto</th>
                        <th>Cantidad</th>
                        <th>Total</th>
                    </tr>
                    </thead>

                    <tbody>

                    <!-- PRODUCTO 1 -->
                    <tr>
                        <td>
                            <input type="number" name="codigoProducto1"
                                   th:value="${codigoProducto1 != null ? codigoProducto1 : param.codigoProducto1}"
                                   class="form-control">
                        </td>

                        <td>
                            <button class="btn btn-secondary btn-sm">Consultar</button>
                        </td>

                        <td>
                            <input type="text" class="form-control"
                                   th:value="${producto1 != null ? producto1.nombreProducto : ''}"
                                   readonly>
                        </td>

                        <td>
                            <input type="number" name="cantidad1"
                                   th:value="${cantidad1 != null ? cantidad1 : (producto1 != null ? 1 : 0)}"
                                   class="form-control"
                                   onchange="this.form.submit()">
                        </td>

                        <td>
                            <input type="text" class="form-control"
                                   th:value="${#numbers.formatDecimal(total1, 0, 'POINT', 0, 'COMMA')}"
                                   readonly>
                        </td>
                    </tr>

                    <tr th:if="${mensajeProducto1}">
                        <td colspan="5">
                            <div class="alert alert-success mt-2 mb-0 text-center">
                                <span th:text="${mensajeProducto1}"></span>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${errorProducto1}">
                        <td colspan="5">
                            <div class="alert alert-danger mt-2 mb-0 text-center">
                                <span th:text="${errorProducto1}"></span>
                            </div>
                        </td>
                    </tr>

                    <!-- PRODUCTO 2 -->
                    <tr>
                        <td>
                            <input type="number" name="codigoProducto2"
                                   th:value="${codigoProducto2 != null ? codigoProducto2 : param.codigoProducto2}"
                                   class="form-control">
                        </td>

                        <td>
                            <button class="btn btn-secondary btn-sm">Consultar</button>
                        </td>

                        <td>
                            <input type="text" class="form-control"
                                   th:value="${producto2 != null ? producto2.nombreProducto : ''}"
                                   readonly>
                        </td>

                        <td>
                            <input type="number" name="cantidad2"
                                   min="0"
                                   th:value="${cantidad2 != null ? cantidad2 : (producto2 != null ? 1 : 0)}"
                                   class="form-control"
                                   onchange="this.form.submit()">
                        </td>

                        <td>
                            <input type="text" class="form-control"
                                   th:value="${#numbers.formatDecimal(total2, 0, 'POINT', 0, 'COMMA')}"
                                   readonly>
                        </td>
                    </tr>

                    <tr th:if="${mensajeProducto2}">
                        <td colspan="5">
                            <div class="alert alert-success mt-2 mb-0 text-center">
                                <span th:text="${mensajeProducto2}"></span>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${errorProducto2}">
                        <td colspan="5">
                            <div class="alert alert-danger mt-2 mb-0 text-center">
                                <span th:text="${errorProducto2}"></span>
                            </div>
                        </td>
                    </tr>

                    <!-- PRODUCTO 3 -->
                    <tr>
                        <td>
                            <input type="number" name="codigoProducto3"
                                   th:value="${codigoProducto3 != null ? codigoProducto3 : param.codigoProducto3}"
                                   class="form-control">
                        </td>

                        <td>
                            <button class="btn btn-secondary btn-sm">Consultar</button>
                        </td>

                        <td>
                            <input type="text" class="form-control"
                                   th:value="${producto3 != null ? producto3.nombreProducto : ''}"
                                   readonly>
                        </td>

                        <td>
                            <input type="number" name="cantidad3"
                                   min="0"
                                   th:value="${cantidad3 != null ? cantidad3 : (producto3 != null ? 1 : 0)}"
                                   class="form-control"
                                   onchange="this.form.submit()">
                        </td>

                        <td>
                            <input type="text" class="form-control"
                                   th:value="${#numbers.formatDecimal(total3, 0, 'POINT', 0, 'COMMA')}"
                                   readonly>
                        </td>
                    </tr>

                    <tr th:if="${mensajeProducto3}">
                        <td colspan="5">
                            <div class="alert alert-success mt-2 mb-0 text-center">
                                <span th:text="${mensajeProducto3}"></span>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${errorProducto3}">
                        <td colspan="5">
                            <div class="alert alert-danger mt-2 mb-0 text-center">
                                <span th:text="${errorProducto3}"></span>
                            </div>
                        </td>
                    </tr>

                    </tbody>
                </table>

                <!-- TOTALES -->
                <div class="row">

                    <div class="col-md-4 offset-md-8">

                        <div class="mb-2">
                            <label>Total Venta</label>
                            <input type="text" class="form-control"
                                   th:value="${#numbers.formatDecimal(totalVenta, 0, 'POINT', 0, 'COMMA')}"
                                   readonly>
                        </div>

                        <div class="mb-2">
                            <label>Total IVA</label>
                            <input type="text" class="form-control"
                                   th:value="${#numbers.formatDecimal(totalIVA, 0, 'POINT', 0, 'COMMA')}"
                                   readonly>
                        </div>

                        <div class="mb-2">
                            <label>Total con IVA</label>
                            <input type="text" class="form-control"
                                   th:value="${#numbers.formatDecimal(totalConIVA, 0, 'POINT', 0, 'COMMA')}"
                                   readonly>
                        </div>

                    </div>

                </div>

            </form>

            <!-- GUARDAR -->
            <form method="post" th:action="@{/ventas/guardar}">

                <input type="hidden" name="cedula"
                       th:value="${cedula != null ? cedula : param.cedula}">

                <input type="hidden" name="codigoProducto1"
                       th:value="${codigoProducto1 != null ? codigoProducto1 : param.codigoProducto1}">
                <input type="hidden" name="cantidad1"
                       th:value="${cantidad1}">

                <input type="hidden" name="codigoProducto2"
                       th:value="${codigoProducto2 != null ? codigoProducto2 : param.codigoProducto2}">
                <input type="hidden" name="cantidad2"
                       th:value="${cantidad2}">

                <input type="hidden" name="codigoProducto3"
                       th:value="${codigoProducto3 != null ? codigoProducto3 : param.codigoProducto3}">
                <input type="hidden" name="cantidad3"
                       th:value="${cantidad3}">

                <button class="btn btn-success">Confirmar</button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
