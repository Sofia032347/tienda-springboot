<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestión de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/usuarios">Sistema Tienda</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/usuarios">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/proveedores">Proveedores</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/clientes">Clientes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/productos">Productos</a>
                </li>
            </ul>

            <a href="/login" class="btn btn-outline-light btn-sm">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Gestión de Clientes</h5>

            <form method="get" action="/clientes" class="d-flex">
                <input type="text"
                       name="buscar"
                       th:value="${buscar}"
                       class="form-control form-control-sm me-2"
                       placeholder="Buscar por nombre o cédula">

                <button class="btn btn-light btn-sm">Buscar</button>
            </form>
        </div>

        <div class="card-body">

            <div class="mb-3">
                <a href="/clientes/nuevo" class="btn btn-success">
                    + Nuevo Cliente
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover">

                    <thead class="table-dark text-center">
                    <tr>
                        <th>Cédula</th>
                        <th>Nombre Completo</th>
                        <th>Dirección</th>
                        <th>Teléfono</th>
                        <th>Correo Electrónico</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="c : ${listaClientes}">
                        <td th:text="${c.cedula}"></td>
                        <td th:text="${c.nombreCompleto}"></td>
                        <td th:text="${c.direccion}"></td>
                        <td th:text="${c.telefono}"></td>
                        <td th:text="${c.correoElectronico}"></td>

                        <td class="text-center">
                            <a th:href="@{/clientes/editar/{id}(id=${c.id})}"
                               class="btn btn-warning btn-sm">Editar</a>

                            <a th:href="@{/clientes/eliminar/{id}(id=${c.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar cliente?')">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
