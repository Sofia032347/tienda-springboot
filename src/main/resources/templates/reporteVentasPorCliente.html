<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reporte - Total Ventas por Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Sistema Tienda</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">💰 Total de Ventas por Cliente</h5>
        <a href="/reportes" class="btn btn-outline-secondary btn-sm">← Volver a Reportes</a>
    </div>

    <div th:if="${reporteVentas == null or #lists.isEmpty(reporteVentas)}" class="alert alert-warning shadow-sm">
        No se encontraron ventas registradas para generar el reporte.
    </div>

    <div th:if="${reporteVentas != null and !#lists.isEmpty(reporteVentas)}" class="card shadow">
        <div class="card-header bg-warning text-dark fw-bold">
            Listado Consolidado
        </div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark text-center">
                <tr>
                    <th style="width: 50px;">#</th>
                    <th>Cédula</th>
                    <th>Nombre Completo</th>
                    <th class="text-end">Ventas Totales (Con IVA)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="fila, iter : ${reporteVentas}">
                    <td th:text="${iter.count}" class="text-center"></td>
                    <td th:text="${fila.cedula}"></td>
                    <td th:text="${fila.nombre}"></td>
                    <td class="text-end fw-semibold"
                        th:text="${'$ ' + #numbers.formatDecimal(fila.total, 1, 'POINT', 2, 'COMMA')}">
                    </td>
                </tr>
                </tbody>
                <tfoot>
                <tr class="table-dark">
                    <td colspan="3" class="text-end fw-bold">TOTAL GENERAL:</td>
                    <td class="text-end fw-bold text-warning"
                        th:text="${'$ ' + #numbers.formatDecimal(totalGeneral, 1, 'POINT', 2, 'COMMA')}">
                    </td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
